<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lostsec | priv8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

        :root { --bg: #050505; --panel: #0d0d10; --border: #1f1f23; --blue: #3b82f6; }

        * { box-sizing: border-box; }
        body { background: var(--bg); color: #ececed; font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; margin: 0; display: flex; overflow: hidden; }

        .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; width: 285px; background: var(--panel); border-right: 1px solid var(--border); transition: .3s ease; z-index: 2000; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        @media(min-width:768px){ .sidebar{ position:static; left:0; } }

        main { flex:1; display:flex; flex-direction:column; height:100dvh; min-width:0; overflow:hidden; }
        #chatContainer { flex:1; overflow-y:auto; padding-bottom:175px; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; }

        .input-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 75%, transparent);
            padding: 8px 10px;
            padding-bottom: calc(8px + env(safe-area-inset-bottom));
            z-index: 1500;
        }
        @media(min-width:768px){ .input-wrapper{ left:285px; padding: 10px 14px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); } }

        .model-item { border:1px solid transparent; transition:.3s; background:rgba(255,255,255,.02); margin-bottom:5px; border-radius:12px; padding:10px 12px; cursor:pointer; }
        .model-item:hover { background:rgba(255,255,255,.05); }
        .active-engine { border-color:var(--blue)!important; background:rgba(59,130,246,.1)!important; }

        .status-dot { height:7px; width:7px; border-radius:50%; transition:.4s; flex-shrink:0; }
        .dot-idle { background:#3f3f46; }
        .dot-success { background:#22c55e; box-shadow:0 0 8px #22c55e; }
        .dot-error { background:#ef4444; box-shadow:0 0 8px #ef4444; }
        .dot-vision { background:#22c55e; box-shadow:0 0 8px #22c55e; }

        #toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-100px); background:#111; border:1px solid #333; color:#fff; padding:10px 22px; border-radius:12px; font-size:11px; font-weight:600; z-index:5000; transition:.5s cubic-bezier(.175,.885,.32,1.275); opacity:0; display:flex; align-items:center; gap:10px; white-space:nowrap; max-width:90vw; text-align:center; }
        #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
        .toast-error { border-color:#ef4444!important; color:#ef4444!important; }
        .toast-success { border-color:#22c55e!important; color:#22c55e!important; }
        .toast-info { border-color:#3b82f6!important; color:#60a5fa!important; }

        .overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:1900; display:none; }
        .overlay.active { display:block; }

        .chat-view { display:none; flex-direction:column; gap:18px; padding:20px; }
        .chat-view.active { display:flex; }

        .msg-user { align-self:flex-end; background:#111; border:1px solid #222; padding:12px 18px; border-radius:20px 20px 0 20px; max-width:85%; font-size:14px; line-height:1.6; word-break:break-word; white-space:pre-wrap; }
        .msg-user-img { align-self:flex-end; max-width:85%; }
        .msg-user-img img { max-width:280px; max-height:200px; border-radius:14px; border:1px solid #333; display:block; }
        .msg-user-file { align-self:flex-end; background:#111827; border:1px solid #1e3a5f; padding:10px 16px; border-radius:16px; font-size:12px; color:#60a5fa; display:flex; align-items:center; gap:8px; max-width:85%; }
        .msg-ai { align-self:flex-start; border-left:2px solid var(--blue); padding-left:14px; font-size:14.5px; color:#d4d4d8; max-width:92%; line-height:1.7; word-break:break-word; }
        .msg-ai strong { color:#f4f4f5; font-weight:700; }
        .msg-ai em { font-style: italic; color: #c4c4c8; }
        .msg-ai h1 { color:#93c5fd; font-size:16px; font-weight:800; margin:16px 0 8px; }
        .msg-ai h2 { color:#93c5fd; font-size:14px; font-weight:700; margin:14px 0 6px; text-transform:uppercase; letter-spacing:.05em; }
        .msg-ai h3 { color:#7dd3fc; font-size:13px; font-weight:700; margin:10px 0 4px; }
        .msg-ai h4 { color:#94a3b8; font-size:11px; font-weight:700; margin:8px 0 3px; text-transform:uppercase; letter-spacing:.05em; }
        .msg-ai ul, .msg-ai ol { padding-left:20px; margin:6px 0; }
        .msg-ai li { margin-bottom:4px; }
        .msg-ai p { margin:6px 0; }
        .msg-ai hr { border:none; border-top:1px solid #2a2a2e; margin:12px 0; }
        .msg-ai a { color: #60a5fa; text-decoration: underline; }

        .code-block-wrap { position:relative; margin:12px 0; border-radius:12px; overflow:hidden; border:1px solid #2a2a2e; background:#0d0d10; }
        .code-block-header { display:flex; justify-content:space-between; align-items:center; background:#0a0a0d; padding:7px 12px; border-bottom:1px solid #2a2a2e; }
        .code-lang-label { font-family:'JetBrains Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:.12em; color:#60a5fa; }
        .code-btn-group { display:flex; gap:5px; }
        .copy-btn { font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; background:transparent; border:1px solid #333; color:#71717a; padding:3px 9px; border-radius:6px; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:4px; font-family:'Plus Jakarta Sans',sans-serif; }
        .copy-btn:hover { border-color:var(--blue); color:var(--blue); }
        .copy-btn.copied { border-color:#22c55e!important; color:#22c55e!important; }
        .editor-btn { font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; background:transparent; border:1px solid #3a2a5e; color:#a78bfa; padding:3px 9px; border-radius:6px; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:4px; font-family:'Plus Jakarta Sans',sans-serif; }
        .editor-btn:hover { background:rgba(167,139,250,.1); }
        .continue-btn { font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; background:transparent; border:1px solid #065f46; color:#34d399; padding:3px 9px; border-radius:6px; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:4px; font-family:'Plus Jakarta Sans',sans-serif; }
        .continue-btn:hover { background:rgba(52,211,153,.1); }

        .msg-ai pre {
            background: #0d0d10;
            padding: 14px 16px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12.5px;
            line-height: 1.75;
            color: #a3e635;
            margin: 0;
            white-space: pre;
            -webkit-overflow-scrolling: touch;
        }
        .msg-ai code { font-family:'JetBrains Mono',monospace; font-size:12px; background:#1a1a1f; border:1px solid #2a2a2e; border-radius:5px; padding:2px 6px; color:#60a5fa; }
        .msg-ai pre code { background:transparent; border:none; padding:0; color:inherit; font-size:inherit; }

        .thinking-dots { display:inline-flex; gap:4px; padding:14px 18px; border-left:2px solid var(--blue); align-self:flex-start; }
        .thinking-dots span { width:6px; height:6px; background:#3b82f6; border-radius:50%; animation:bounce .9s infinite; }
        .thinking-dots span:nth-child(2){ animation-delay:.15s; }
        .thinking-dots span:nth-child(3){ animation-delay:.3s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

        #historyPanel { display:none; flex-direction:column; border-top:1px solid var(--border); max-height:190px; overflow-y:auto; }
        #historyPanel.open { display:flex; }
        .history-item { padding:8px 14px; font-size:10px; color:#71717a; cursor:pointer; border-bottom:1px solid #0f0f12; display:flex; justify-content:space-between; align-items:center; transition:.2s; gap:8px; }
        .history-item:hover { background:rgba(255,255,255,.03); color:#aaa; }

        #editorPanel { position:fixed; right:-100%; top:0; bottom:0; width:min(520px,96vw); background:#0a0a0d; border-left:1px solid var(--border); z-index:3000; display:flex; flex-direction:column; transition:.35s ease; }
        #editorPanel.open { right:0; }
        .editor-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); background:#0d0d10; flex-shrink:0; flex-wrap:wrap; gap:8px; }
        .editor-tabs { display:flex; gap:5px; }
        .editor-tab { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; padding:4px 10px; border-radius:6px; cursor:pointer; color:#52525b; border:1px solid transparent; transition:.2s; }
        .editor-tab.active { color:var(--blue); border-color:var(--blue); background:rgba(59,130,246,.08); }
        #codeEditorArea { flex:1; background:#050508; color:#a3e635; font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.75; padding:16px; border:none; outline:none; resize:none; overflow-y:auto; tab-size:4; -webkit-overflow-scrolling:touch; }
        #previewFrame { flex:1; border:none; background:#fff; display:none; width:100%; }
        .editor-actions { display:flex; gap:7px; padding:10px 14px; border-top:1px solid var(--border); background:#0d0d10; flex-shrink:0; flex-wrap:wrap; }

        .sys-box { background:#0d0d10; border:1px solid var(--border); border-radius:18px; width:100%; max-width:500px; padding:22px; display:flex; flex-direction:column; gap:12px; max-height:90dvh; overflow-y:auto; }

        .tool-btn { background:rgba(255,255,255,.04); border:1px solid #2a2a2a; color:#71717a; border-radius:8px; padding:5px 11px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; cursor:pointer; transition:.2s; display:flex; align-items:center; gap:5px; font-family:'Plus Jakarta Sans',sans-serif; white-space:nowrap; }
        .tool-btn:hover { border-color:var(--blue); color:var(--blue); }

        #htmlPreviewModal { position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:9999; flex-direction:column; display:none; }
        #htmlPreviewModal.open { display:flex !important; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#2a2a2e; border-radius:4px; }

        .chip { flex-shrink:0; font-size:9px; background:rgba(255,255,255,.03); border:1px solid #222; color:#71717a; padding:5px 12px; border-radius:20px; cursor:pointer; transition:.2s; font-weight:700; white-space:nowrap; }
        .chip:hover { border-color:var(--blue); color:var(--blue); }
        .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
        .no-scrollbar::-webkit-scrollbar { display:none; }
        .sec-label { font-size:8px; font-weight:800; letter-spacing:.15em; text-transform:uppercase; color:#3f3f46; padding:8px 4px 2px; }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 9px 10px;
            outline: none;
            font-size: 13px;
            color: #e4e4e7;
            resize: none;
            line-height: 1.45;
            min-height: 36px;
            max-height: 120px;
            overflow-y: auto;
            -webkit-appearance: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-overflow-scrolling: touch;
            word-break: break-word;
        }
        #userInput::placeholder { color: #3f3f46; font-size: 12px; }

        #contextBadge { display: none; font-size: 8px; background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3); color: #60a5fa; padding: 2px 8px; border-radius: 20px; font-weight: 700; letter-spacing: .05em; }
        #contextBadge.visible { display: inline-flex; align-items: center; gap: 4px; }

        #attachPreview { display:none; align-items:center; gap:8px; background:#0d1117; border:1px solid #1e3a5f; border-radius:12px; padding:6px 10px; margin-bottom:6px; flex-wrap:wrap; }
        #attachPreview.visible { display:flex; }
        .attach-thumb { position:relative; display:inline-flex; }
        .attach-thumb img { height:48px; width:48px; object-fit:cover; border-radius:8px; border:1px solid #2a2a3e; }
        .attach-thumb .remove-attach { position:absolute; top:-5px; right:-5px; background:#ef4444; color:#fff; border:none; border-radius:50%; width:16px; height:16px; font-size:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
        .attach-file-chip { display:inline-flex; align-items:center; gap:6px; background:#0a1628; border:1px solid #1e3a5f; border-radius:8px; padding:4px 10px; font-size:10px; color:#60a5fa; font-weight:700; }
        .attach-file-chip .remove-attach { background:#ef4444; color:#fff; border:none; border-radius:50%; width:14px; height:14px; font-size:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

        .vision-badge { font-size:7px; background:rgba(167,139,250,.15); border:1px solid rgba(167,139,250,.3); color:#a78bfa; padding:2px 6px; border-radius:10px; font-weight:700; letter-spacing:.05em; margin-left:4px; }

        .truncated-notice { display:flex; align-items:center; gap:8px; padding:8px 14px; background:rgba(234,179,8,.05); border:1px solid rgba(234,179,8,.2); border-radius:10px; margin-top:8px; }
        .truncated-notice span { font-size:11px; color:#ca8a04; flex:1; }
    </style>
</head>
<body>

<div id="toast"><i class="fa fa-circle-dot fa-xs"></i> <span id="toastMsg"></span></div>
<div id="overlay" class="overlay" onclick="closeMobileSidebar()"></div>



<div id="htmlPreviewModal" style="position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:3500;flex-direction:column;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0d0d10;border-bottom:1px solid #1f1f23;flex-shrink:0;">
        <span style="font-size:10px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:#38bdf8;"><i class="fa fa-eye fa-xs" style="margin-right:6px;"></i>HTML Preview</span>
        <div style="display:flex;gap:8px;">
            <button onclick="document.getElementById('htmlPreviewFrame').srcdoc=document.getElementById('htmlPreviewFrame').srcdoc" style="font-size:9px;font-weight:700;text-transform:uppercase;background:transparent;border:1px solid #333;color:#71717a;padding:3px 10px;border-radius:6px;cursor:pointer;"><i class="fa fa-rotate fa-xs"></i> Reload</button>
            <button onclick="closeHtmlPreview()" style="font-size:9px;font-weight:700;text-transform:uppercase;background:transparent;border:1px solid #3a1a1a;color:#ef4444;padding:3px 10px;border-radius:6px;cursor:pointer;"><i class="fa fa-xmark fa-xs"></i> Close</button>
        </div>
    </div>
    <iframe id="htmlPreviewFrame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms" style="flex:1;border:none;background:#fff;width:100%;"></iframe>
</div>

<div id="editorPanel">
    <div class="editor-header">
        <div class="editor-tabs">
            <div class="editor-tab active" id="tabCode" onclick="switchEditorTab('code')"><i class="fa fa-code fa-xs mr-1"></i>Code</div>
            <div class="editor-tab" id="tabPreview" onclick="switchEditorTab('preview')"><i class="fa fa-eye fa-xs mr-1"></i>Preview</div>
        </div>
        <div class="flex items-center gap-2">
            <select id="langSelect" class="bg-zinc-900 border border-zinc-800 text-[9px] text-zinc-400 rounded-lg px-2 py-1 outline-none font-mono">
                <option value="html">HTML</option>
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="css">CSS</option>
                <option value="sql">SQL</option>
                <option value="bash">Bash</option>
                <option value="json">JSON</option>
                <option value="text">Text</option>
            </select>
            <button onclick="closeEditor()" class="text-zinc-500 hover:text-white text-base leading-none px-1">&times;</button>
        </div>
    </div>
    <textarea id="codeEditorArea" placeholder="Write your code here..."></textarea>
    <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-modals"></iframe>
    <div class="editor-actions">
        <button onclick="copyEditorCode()" class="tool-btn"><i class="fa fa-copy fa-xs"></i> Copy</button>
        <button onclick="clearEditor()" class="tool-btn"><i class="fa fa-trash fa-xs"></i> Clear</button>
        <button onclick="runPreview()" class="tool-btn"><i class="fa fa-play fa-xs"></i> Run</button>
        <button onclick="sendEditorToAI()" class="tool-btn" style="border-color:#7c3aed;color:#a78bfa;"><i class="fa fa-robot fa-xs"></i> Ask AI</button>
        <button onclick="downloadCode()" class="tool-btn"><i class="fa fa-download fa-xs"></i> Save</button>
    </div>
</div>

<input type="file" id="imageFileInput" accept="*/*" style="display:none" onchange="handleImageAttach(this)">
<input type="file" id="codeFileInput" accept="*/*" style="display:none" onchange="handleFileAttach(this)">

<aside id="sidebar" class="sidebar">
    <div class="p-5 border-b border-zinc-900 flex items-center justify-between">
        <div>
            <div class="font-black tracking-tighter text-xs uppercase text-blue-500">Lostsec | priv8</div>
            <div class="text-[8px] text-zinc-600 font-mono mt-0.5">v16.0 · VISION + FILES · GEMINI</div>
        </div>
        <button class="md:hidden text-zinc-500 p-1 text-lg" onclick="closeMobileSidebar()">&times;</button>
    </div>

    <div class="p-4 space-y-2 border-b border-zinc-900">
        <input type="password" id="apiKeyInput" placeholder="PASTE GEMINI API KEY" class="w-full bg-zinc-950 border border-zinc-800 p-2.5 rounded-xl text-[10px] focus:border-blue-500 outline-none font-mono" autocomplete="off">
        <div class="flex gap-2">
            <button onclick="fetchAndAutoVerify()" class="flex-1 bg-white text-black text-[10px] font-black py-2.5 rounded-xl uppercase tracking-widest active:scale-95">Authenticate</button>
            <button onclick="clearApiKey()" class="bg-zinc-900 border border-zinc-800 text-zinc-500 px-3 rounded-xl hover:text-red-500 transition text-xs"><i class="fa fa-trash-can"></i></button>
        </div>
    </div>

    <div class="p-3 border-b border-zinc-900 flex gap-2">
        <button onclick="openEditor()" class="tool-btn flex-1"><i class="fa fa-terminal fa-xs"></i> Editor</button>
    </div>

    <div class="p-3 border-b border-zinc-900 flex items-center justify-between">
        <span class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Multi-Turn Chat</span>
        <button onclick="toggleContextMode()" id="contextToggleBtn" class="tool-btn" style="border-color:#22c55e;color:#22c55e;">
            <i class="fa fa-brain fa-xs"></i> <span id="contextToggleLabel">ON</span>
        </button>
    </div>

    <div class="sec-label px-4">Models</div>
    <div class="flex-1 overflow-y-auto p-3" id="modelList">
        <div class="text-center py-16 opacity-20 text-[9px] uppercase tracking-widest">Awaiting Command</div>
    </div>

    <div class="border-t border-zinc-900">
        <button onclick="toggleHistory()" class="w-full flex items-center justify-between px-4 py-3 text-[9px] font-bold uppercase tracking-widest text-zinc-600 hover:text-zinc-400 transition">
            <span><i class="fa fa-clock-rotate-left fa-xs mr-2"></i>Chat History</span>
            <i class="fa fa-chevron-up fa-xs" id="historyChevron" style="transition:.3s;"></i>
        </button>
        <div id="historyPanel"></div>
    </div>
</aside>

<main>
    <header class="h-14 flex items-center justify-between px-4 border-b border-zinc-900/50 bg-black/60 backdrop-blur-md flex-shrink-0">
        <div class="flex items-center gap-3">
            <button class="md:hidden text-zinc-400 p-2" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
            <div>
                <div id="currentModelDisplay" class="text-[9px] font-bold tracking-[.2em] text-zinc-500 uppercase">OFFLINE</div>
                <div id="tokenCounter" class="text-[10px] text-zinc-400 font-mono font-bold">tokens: 0</div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="openEditor()" class="tool-btn"><i class="fa fa-terminal fa-xs"></i> Editor</button>
            <button onclick="exportChat()" class="tool-btn" title="Export chat"><i class="fa fa-file-export fa-xs"></i> Export</button>
            <button onclick="clearChat()" class="tool-btn" style="color:#ef4444;border-color:#3a1a1a;" title="Clear chat"><i class="fa fa-broom fa-xs"></i> Clear</button>
        </div>
    </header>

    <div id="chatContainer"></div>

    <div class="input-wrapper">
        <div class="max-w-4xl mx-auto">
            <div id="attachPreview"></div>

            <div class="flex items-end gap-2 bg-zinc-900 border border-zinc-800 p-1.5 rounded-2xl shadow-2xl">
                <div class="flex gap-1 pb-0.5 flex-shrink-0">
                    <button onclick="document.getElementById('imageFileInput').click()" id="imgAttachBtn" class="h-8 w-8 flex items-center justify-center bg-zinc-800 text-zinc-500 rounded-xl hover:bg-purple-900/40 hover:text-purple-400 transition text-xs" title="Image attach (vision models)"><i class="fa fa-image text-xs"></i></button>
                    <button onclick="document.getElementById('codeFileInput').click()" class="h-8 w-8 flex items-center justify-center bg-zinc-800 text-zinc-500 rounded-xl hover:bg-blue-900/40 hover:text-blue-400 transition text-xs" title="File attach (HTML, Python, etc.)"><i class="fa fa-paperclip text-xs"></i></button>
                </div>
                <textarea id="userInput" rows="1" placeholder="Message..." oninput="autoResize(this)"></textarea>
                <div class="flex gap-1.5 pb-0.5 flex-shrink-0">
                    <button onclick="toggleEditorSend()" id="editorSendBtn" class="h-8 w-8 flex items-center justify-center bg-zinc-800 text-zinc-500 rounded-xl hover:bg-zinc-700 transition text-xs" title="Include editor code"><i class="fa fa-terminal text-xs"></i></button>
                    <button onclick="executeRequest()" id="sendBtn" class="h-8 w-8 flex items-center justify-center bg-white text-black rounded-xl hover:bg-blue-600 hover:text-white transition">
                        <i class="fa fa-bolt text-xs" id="btnIcon"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>
</main>

<script>
    let activeModel = "";
    let sessionTokens = 0;
    let editorSendMode = false;
    let historyOpen = false;
    let multiTurnMode = true;
    let conversationHistories = {};
    let pendingImages = [];
    let pendingFiles = [];
    let visionModelIds = new Set();

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    function isVisionModel(modelName) {

    function handleImageAttach(input) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 20 * 1024 * 1024) { showToast('Image must be smaller than 20MB'); return; }

        const reader = new FileReader();
        reader.onload = (e) => {
            const dataUrl = e.target.result;
            const base64 = dataUrl.split(',')[1];
            const mimeType = file.type || 'image/png';
            pendingImages.push({ base64, mimeType, name: file.name, preview: dataUrl });
            renderAttachPreview();
            showToast('Image attached!', 'success');
        };
        reader.readAsDataURL(file);
        input.value = '';
    }

    async function handleFileAttach(input) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 20 * 1024 * 1024) { showToast('File must be smaller than 20MB'); return; }

        const reader = new FileReader();
        reader.onload = (e) => {
            pendingFiles.push({ content: e.target.result, name: file.name, type: file.type });
            renderAttachPreview();
            showToast(`${file.name} attached!`, 'success');
        };
        reader.readAsText(file);
        input.value = '';
    }

    function renderAttachPreview() {
        const preview = document.getElementById('attachPreview');
        preview.innerHTML = '';
        let hasAny = false;

        pendingImages.forEach((img, idx) => {
            hasAny = true;
            const wrap = document.createElement('div');

            wrap.innerHTML = `<img src="${img.preview}" alt="${esc(img.name)}"><button class="remove-attach" onclick="removeImage(${idx})">×</button>`;
            preview.appendChild(wrap);
        });

        pendingFiles.forEach((f, idx) => {
            hasAny = true;
            const ext = f.name.split('.').pop().toUpperCase();
            const chip = document.createElement('div');
            chip.className = 'attach-file-chip';
            chip.innerHTML = `<i class="fa fa-file-code fa-xs"></i><span>${esc(f.name)}</span><button class="remove-attach" onclick="removeFile(${idx})">×</button>`;

    }

    function removeImage(idx) { pendingImages.splice(idx, 1); renderAttachPreview(); }
    function removeFile(idx) { pendingFiles.splice(idx, 1); renderAttachPreview(); }

    function renderMarkdown(text) {
        const codeBlocks = [];
        text = text.replace(/```(\w*)\r?\n?([\s\S]*?)```/g, (_, lang, code) => {
            const idx = codeBlocks.length;
            codeBlocks.push({ lang: lang.trim(), code: code.trimEnd() });
            return `\x00CODE${idx}\x00`;
        });

        const lines = text.split('\n');
        let html = '';
        let inUL = false;
        let inOL = false;
        let paraBuffer = [];

        function flushPara() {
            if (!paraBuffer.length) return;
            const content = paraBuffer.join(' ').trim();
            if (content) html += `<p style="margin:6px 0;">${content}</p>`;
            paraBuffer = [];
        }
        function closeList() {
            if (inUL) { html += '</ul>'; inUL = false; }
            if (inOL) { html += '</ol>'; inOL = false; }
        }

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];
            if (/^\x00CODE\d+\x00$/.test(line.trim())) {
                flushPara(); closeList();
                const idx = parseInt(line.trim().match(/\d+/)[0]);
                const { lang, code } = codeBlocks[idx];
                html += buildCodeBlock(lang, code);
                continue;
            }
            const h4 = line.match(/^####\s+(.+)$/);
            const h3 = line.match(/^###\s+(.+)$/);
            const h2 = line.match(/^##\s+(.+)$/);
            const h1 = line.match(/^#\s+(.+)$/);
            if (h4) { flushPara(); closeList(); html += `<h4>${inlineFormat(h4[1])}</h4>`; continue; }
            if (h3) { flushPara(); closeList(); html += `<h3>${inlineFormat(h3[1])}</h3>`; continue; }
            if (h2) { flushPara(); closeList(); html += `<h2>${inlineFormat(h2[1])}</h2>`; continue; }
            if (h1) { flushPara(); closeList(); html += `<h2>${inlineFormat(h1[1])}</h2>`; continue; }
            if (/^---+$/.test(line.trim())) { flushPara(); closeList(); html += '<hr>'; continue; }
            const ulMatch = line.match(/^[\*\-]\s+(.+)$/);
            if (ulMatch) {
                flushPara();
                if (!inUL) { if (inOL) { html += '</ol>'; inOL = false; } html += '<ul style="padding-left:20px;margin:6px 0;">'; inUL = true; }
                html += `<li>${inlineFormat(ulMatch[1])}</li>`;
                continue;
            }
            const olMatch = line.match(/^\d+\.\s+(.+)$/);
            if (olMatch) {
                flushPara();
                if (!inOL) { if (inUL) { html += '</ul>'; inUL = false; } html += '<ol style="padding-left:20px;margin:6px 0;">'; inOL = true; }
                html += `<li>${inlineFormat(olMatch[1])}</li>`;
                continue;
            }
            if (line.trim() === '') { flushPara(); closeList(); continue; }
            if (inUL) { html += '</ul>'; inUL = false; }
            if (inOL) { html += '</ol>'; inOL = false; }
            paraBuffer.push(inlineFormat(line));
        }

        flushPara();
        closeList();
        html = html.replace(/\x00CODE(\d+)\x00/g, (_, idx) => {
            const { lang, code } = codeBlocks[parseInt(idx)];
            return buildCodeBlock(lang, code);
        });
        return html;
    }

    function inlineFormat(text) {
        let remaining = text;
        let inlineCodeParts = [];
        remaining = remaining.replace(/`([^`\n]+)`/g, (_, c) => {
            const idx = inlineCodeParts.length;
            inlineCodeParts.push(`<code>${esc(c)}</code>`);
            return `\x00IC${idx}\x00`;
        });
        remaining = esc(remaining);
        remaining = remaining.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
        remaining = remaining.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        remaining = remaining.replace(/\*(.+?)\*/g, '<em>$1</em>');
        remaining = remaining.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        remaining = remaining.replace(/\x00IC(\d+)\x00/g, (_, i) => inlineCodeParts[parseInt(i)]);
        return remaining;
    }

    const _codeBlockStore = {};
    function buildCodeBlock(lang, code) {
        const langLabel = esc(lang) || 'code';
        const escapedCode = esc(code);
        const blockId = 'cb_' + Math.random().toString(36).slice(2);
        _codeBlockStore[blockId] = { code, lang };
        const isHtml = lang.toLowerCase() === 'html' || lang.toLowerCase() === 'htm';
        const previewBtn = isHtml ? `<button class="copy-btn preview-html-btn" data-blockid="${blockId}" style="border-color:#0ea5e9;color:#38bdf8;"><i class="fa fa-eye fa-xs"></i> Preview</button>` : '';
        return `<div class="code-block-wrap" id="${blockId}">
            <div class="code-block-header">
                <span class="code-lang-label">${langLabel}</span>
                <div class="code-btn-group">
                    <button class="copy-btn" onclick="copyCode(this)"><i class="fa fa-copy fa-xs"></i> Copy</button>
                    <button class="editor-btn" onclick="injectFromBlock('${blockId}')"><i class="fa fa-terminal fa-xs"></i> Editor</button>
                    ${previewBtn}
                </div>
            </div>
            <pre><code>${escapedCode}</code></pre>
        </div>`;
    }

    function previewHtml(blockId) {
        const data = _codeBlockStore[blockId];
        if (!data) { showToast('Preview data not found'); return; }
        const modal = document.getElementById('htmlPreviewModal');
        const frame = document.getElementById('htmlPreviewFrame');
        frame.srcdoc = data.code;
        modal.style.display = 'flex';
    }
    function closeHtmlPreview() {
        const modal = document.getElementById('htmlPreviewModal');
        const frame = document.getElementById('htmlPreviewFrame');
        modal.style.display = 'none';
        frame.srcdoc = '';
    }

    function injectFromBlock(blockId) {
        const data = _codeBlockStore[blockId];
        if (!data) return;
        injectToEditor(data.code, data.lang);
    }

    function copyCode(btn) {
        const wrap = btn.closest('.code-block-wrap');
        if (!wrap) return;
        const blockId = wrap.id;
        const code = (_codeBlockStore[blockId] && _codeBlockStore[blockId].code)
            || wrap.querySelector('pre code')?.textContent || '';
        if (!code) { showToast('Nothing to copy'); return; }
        function onSuccess() {
            btn.innerHTML = '<i class="fa fa-check fa-xs"></i> Copied!';
            btn.classList.add('copied');
            showToast('Code copied!', 'success');
            setTimeout(() => { btn.innerHTML = '<i class="fa fa-copy fa-xs"></i> Copy'; btn.classList.remove('copied'); }, 2000);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(code).then(onSuccess).catch(() => fallbackCopy(code, onSuccess));
        } else {
            fallbackCopy(code, onSuccess);
        }
    }
    function fallbackCopy(text, onSuccess) {
        try {
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
            document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0, text.length);
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            if (ok) onSuccess(); else showToast('Copy failed — select manually');
        } catch(e) { showToast('Copy not supported'); }
    }

    async function fetchAndAutoVerify(silent = false) {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (!key) return showToast('Enter API Key');
        const list = document.getElementById('modelList');
        if (!silent) list.innerHTML = '<div class="p-4 text-[9px] text-blue-400 animate-pulse font-mono">INITIATING...</div>';
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${encodeURIComponent(key)}`);
            const data = await res.json();
            if (data.error) {
                if (!silent) showToast('Invalid Key: ' + (data.error.message || ''));
                return;
            }
            localStorage.setItem(KEY_STORAGE, key);
            list.innerHTML = '';
            visionModelIds.clear();
            const filtered = (data.models || []).filter(m =>
                m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent')
            );
            if (!filtered.length) {
                list.innerHTML = '<div class="p-4 text-[9px] text-red-400 font-mono">No compatible models found</div>';
                return;
            }
            filtered.forEach(m => {
                const id = m.name.replace(/\//g, '-');
                const hasVision = isVisionModel(m.name);
                if (hasVision) visionModelIds.add(id);
                const el = document.createElement('div');
                el.className = 'model-item';
                el.id = `btn-${id}`;
                el.innerHTML = `<div class="flex justify-between items-center gap-2">
                    <div class="min-w-0">
                        <div class="text-[10px] font-bold text-zinc-400 truncate">${esc(m.displayName || m.name)}</div>
                        <div class="text-[8px] text-zinc-700 font-mono truncate">${esc(m.name.split('/').pop())}</div>
                    </div>
                    <div class="status-dot dot-idle" id="dot-${id}"></div>
                </div>`;
                el.onclick = () => selectModel(m.name, id);
                list.appendChild(el);
                restoreChatView(id);
                validateNode(m.name, key, id);
            });
            if (!silent) showToast(`${filtered.length} models loaded`, 'success');
        } catch (e) {
            if (!silent) showToast('Connection Error: ' + e.message);
        }
    }

    async function validateNode(name, key, elementId) {
        const dot = document.getElementById(`dot-${elementId}`);
        if (!dot) return;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${name}:generateContent?key=${encodeURIComponent(key)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: 'hi' }] }] })
            });
            if (res.ok) {
                dot.className = visionModelIds.has(elementId) ? 'status-dot dot-vision' : 'status-dot dot-success';
            } else {
                dot.className = 'status-dot dot-error';
            }
        } catch {
            dot.className = 'status-dot dot-error';
        }
    }

    function restoreChatView(id) {
        if (!document.getElementById(`view-${id}`)) {
            const allChats = JSON.parse(localStorage.getItem(CHAT_STORAGE) || '{}');
            const view = document.createElement('div');
            view.id = `view-${id}`;
            view.className = 'chat-view';
            const stored = allChats[id];
            if (stored) {
                try {
                    const msgs = JSON.parse(stored);
                    msgs.forEach(msg => {
                        if (msg.role === 'user') {
                            const d = document.createElement('div');
                            d.className = 'msg-user';
                            d.textContent = msg.text;
                            view.appendChild(d);
                        } else if (msg.role === 'ai') {
                            const d = document.createElement('div');
                            d.className = 'msg-ai';
                            d.innerHTML = renderMarkdown(msg.text);
                            view.appendChild(d);
                        }
                    });
                } catch(e) {}
            }
            document.getElementById('chatContainer').appendChild(view);
        }
    }

    function selectModel(name, id) {
        activeModel = name;
        document.querySelectorAll('.model-item').forEach(el => el.classList.remove('active-engine'));
        document.getElementById(`btn-${id}`)?.classList.add('active-engine');
        document.getElementById('currentModelDisplay').textContent = name.split('/').pop().toUpperCase();
        document.querySelectorAll('.chat-view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${id}`)?.classList.add('active');

        const visionBadge = document.getElementById('visionActiveBadge');
        if (visionModelIds.has(id)) {
            visionBadge.style.display = 'inline-flex';
        } else {
            visionBadge.style.display = 'none';
        }

        if (window.innerWidth < 768) closeMobileSidebar();
        scrollToBottom();
        refreshHistory();
    }

    function detectTruncation(text) {
        if (!text || text.length < 100) return false;
        const trimmed = text.trimEnd();
        const hasOpenFence = (trimmed.match(/```/g) || []).length % 2 !== 0;
        return hasOpenFence;
    }

    async function continueGeneration(modelId) {
        const key = localStorage.getItem(KEY_STORAGE);
        if (!key || !activeModel) return;
        const view = document.getElementById(`view-${modelId}`);
        if (!view) return;

        const notice = view.querySelector('.truncated-notice');
        if (notice) notice.remove();

        const thinkDiv = document.createElement('div');
        thinkDiv.className = 'thinking-dots';
        thinkDiv.innerHTML = '<span></span><span></span><span></span>';
        view.appendChild(thinkDiv);
        scrollToBottom();

        const continuePrompt = 'Continue from exactly where you stopped. Do not repeat anything. Just continue the code/text seamlessly.';
        if (multiTurnMode && conversationHistories[modelId]) {
            conversationHistories[modelId].push({ role: 'user', parts: [{ text: continuePrompt }] });
        }

        const contents = multiTurnMode
            ? conversationHistories[modelId]
            : [{ role: 'user', parts: [{ text: continuePrompt }] }];

        try {
            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/${activeModel}:generateContent?key=${encodeURIComponent(key)}`,
                { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents, generationConfig: { temperature: 0.9, maxOutputTokens: 8192, topP: 0.95 } }) }
            );
            const data = await res.json();
            if (view.contains(thinkDiv)) view.removeChild(thinkDiv);

            if (!data.error) {
                const aiMsg = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                if (multiTurnMode && conversationHistories[modelId]) {
                    conversationHistories[modelId].push({ role: 'model', parts: [{ text: aiMsg }] });
                    if (conversationHistories[modelId].length > 40) {
                        conversationHistories[modelId] = conversationHistories[modelId].slice(-40);
                    }
                }
                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg-ai';
                aiDiv.innerHTML = renderMarkdown(aiMsg);

                if (detectTruncation(aiMsg)) {
                    const noticeEl = buildTruncatedNotice(modelId);
                    aiDiv.appendChild(noticeEl);
                }

                view.appendChild(aiDiv);
                saveChatMessages(modelId, continuePrompt, aiMsg);
                const usage = data.usageMetadata;
                if (usage) {
                    sessionTokens += (usage.totalTokenCount || 0);
                    document.getElementById('tokenCounter').textContent = `tokens: ${sessionTokens.toLocaleString()}`;
                }
            }
        } catch(err) {
            if (view.contains(thinkDiv)) view.removeChild(thinkDiv);
            showToast('Continue failed: ' + err.message);
        }
        scrollToBottom();
    }

    function buildTruncatedNotice(modelId) {
        const noticeEl = document.createElement('div');
        noticeEl.className = 'truncated-notice';
        noticeEl.innerHTML = `<i class="fa fa-triangle-exclamation fa-xs" style="color:#ca8a04;"></i><span>Response cut off — click Continue to get the rest</span><button class="continue-btn" onclick="continueGeneration('${modelId}')"><i class="fa fa-forward fa-xs"></i> Continue</button>`;
        return noticeEl;
    }

    async function executeRequest() {
        const input = document.getElementById('userInput');
        const userTypedText = input.value.trim();
        const key = localStorage.getItem(KEY_STORAGE);

        if (!key) { showToast('No API key found. Please authenticate.'); return; }
        if (!activeModel) { showToast('Please select a model first'); return; }
        if (!userTypedText && pendingImages.length === 0 && pendingFiles.length === 0) return;

        const capturedImages = [...pendingImages];
        const capturedFiles = [...pendingFiles];
        pendingImages = [];
        pendingFiles = [];
        renderAttachPreview();

        let displayText = userTypedText;
        let apiText = userTypedText || (capturedImages.length > 0 ? 'Describe this image in detail.' : '');

        if (editorSendMode) {
            const code = document.getElementById('codeEditorArea').value.trim();
            const lang = document.getElementById('langSelect').value;
            if (code) {
                const snippet = `\n\nCode from editor:\n\`\`\`${lang}\n${code}\n\`\`\``;
                apiText += snippet;
                displayText += snippet;
            }
        }

        for (const f of capturedFiles) {
            const ext = f.name.split('.').pop().toLowerCase();
            apiText += `\n\n--- File: ${f.name} ---\n\`\`\`${ext}\n${f.content}\n\`\`\``;
        }

        const modelId = activeModel.replace(/\//g, '-');
        const view = document.getElementById(`view-${modelId}`);
        if (!view) return;

        if (displayText) {
            const userDiv = document.createElement('div');
            userDiv.className = 'msg-user';
            userDiv.textContent = displayText;
            view.appendChild(userDiv);
        }

        for (const img of capturedImages) {
            const imgDiv = document.createElement('div');
            imgDiv.className = 'msg-user-img';
            const imgEl = document.createElement('img');
            imgEl.src = img.preview;
            imgEl.alt = img.name;
            imgDiv.appendChild(imgEl);
            view.appendChild(imgDiv);
        }

        for (const f of capturedFiles) {
            const fileDiv = document.createElement('div');
            fileDiv.className = 'msg-user-file';
            fileDiv.innerHTML = `<i class="fa fa-file-code fa-xs"></i> ${esc(f.name)}`;
            view.appendChild(fileDiv);
        }

        input.value = '';
        input.style.height = 'auto';
        document.getElementById('btnIcon').className = 'fa fa-sync animate-spin';
        document.getElementById('sendBtn').disabled = true;

        const thinkDiv = document.createElement('div');
        thinkDiv.className = 'thinking-dots';
        thinkDiv.innerHTML = '<span></span><span></span><span></span>';
        view.appendChild(thinkDiv);
        scrollToBottom();

        if (!conversationHistories[modelId]) conversationHistories[modelId] = [];

        const userParts = [{ text: apiText }];
        for (const img of capturedImages) {
            userParts.unshift({ inlineData: { mimeType: img.mimeType, data: img.base64 } });
        }

        conversationHistories[modelId].push({ role: 'user', parts: userParts });

        const contents = multiTurnMode
            ? conversationHistories[modelId]
            : [{ role: 'user', parts: userParts }];

        try {
            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/${activeModel}:generateContent?key=${encodeURIComponent(key)}`,
                { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents, generationConfig: { temperature: 0.9, maxOutputTokens: 8192, topP: 0.95 } }) }
            );
            const data = await res.json();
            if (view.contains(thinkDiv)) view.removeChild(thinkDiv);

            if (data.error) {
                if (multiTurnMode) conversationHistories[modelId].pop();
                const errDiv = document.createElement('div');
                errDiv.className = 'msg-ai';
                errDiv.style.color = '#f87171';
                errDiv.textContent = `API Error: ${data.error.message}`;
                view.appendChild(errDiv);
            } else {
                const aiMsg = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response received.';
                const finishReason = data.candidates?.[0]?.finishReason;

                if (multiTurnMode) {
                    conversationHistories[modelId].push({ role: 'model', parts: [{ text: aiMsg }] });
                    if (conversationHistories[modelId].length > 40) {
                        conversationHistories[modelId] = conversationHistories[modelId].slice(-40);
                    }
                }

                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg-ai';
                aiDiv.innerHTML = renderMarkdown(aiMsg);

                const wasTruncated = finishReason === 'MAX_TOKENS';
                if (wasTruncated) {
                    const noticeEl = buildTruncatedNotice(modelId);
                    aiDiv.appendChild(noticeEl);
                }

                view.appendChild(aiDiv);

                const usage = data.usageMetadata;
                if (usage) {
                    sessionTokens += (usage.totalTokenCount || 0);
                    document.getElementById('tokenCounter').textContent = `tokens: ${sessionTokens.toLocaleString()}`;
                }

                saveChatMessages(modelId, displayText || apiText, aiMsg);
            }

            saveHistory(displayText || apiText, modelId);

        } catch (err) {
            if (view.contains(thinkDiv)) view.removeChild(thinkDiv);
            if (multiTurnMode) conversationHistories[modelId].pop();
            const errDiv = document.createElement('div');
            errDiv.className = 'msg-ai';
            errDiv.style.color = '#f87171';
            errDiv.textContent = `Network Error: ${err.message}`;
            view.appendChild(errDiv);
        }

        document.getElementById('btnIcon').className = 'fa fa-bolt';
        document.getElementById('sendBtn').disabled = false;
        scrollToBottom();
    }

    function saveChatMessages(modelId, userText, aiText) {
        try {
            const allChats = JSON.parse(localStorage.getItem(CHAT_STORAGE) || '{}');
            if (!allChats[modelId]) allChats[modelId] = '[]';
            const msgs = JSON.parse(allChats[modelId]);
            msgs.push({ role: 'user', text: userText });
            msgs.push({ role: 'ai', text: aiText });
            const trimmed = msgs.slice(-100);
            allChats[modelId] = JSON.stringify(trimmed);
            localStorage.setItem(CHAT_STORAGE, JSON.stringify(allChats));
        } catch(e) {}
    }

    function saveHistory(prompt, modelId) {
        try {
            const hist = JSON.parse(localStorage.getItem(HIST_STORAGE) || '[]');
            hist.unshift({ prompt: prompt.substring(0, 90), modelId, time: Date.now() });
            if (hist.length > 60) hist.pop();
            localStorage.setItem(HIST_STORAGE, JSON.stringify(hist));
            if (historyOpen) refreshHistory();
        } catch(e) {}
    }

    function refreshHistory() {
        const panel = document.getElementById('historyPanel');
        const modelId = activeModel.replace(/\//g, '-');
        let hist = [];
        try {
            hist = JSON.parse(localStorage.getItem(HIST_STORAGE) || '[]').filter(h => h.modelId === modelId);
        } catch(e) {}
        if (!hist.length) {
            panel.innerHTML = '<div class="px-4 py-3 text-[9px] text-zinc-700 font-mono">No history for this model</div>';
            return;
        }
        panel.innerHTML = '';
        hist.forEach(h => {
            const t = new Date(h.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const item = document.createElement('div');
            item.className = 'history-item';
            const span1 = document.createElement('span');
            span1.className = 'truncate';
            span1.textContent = h.prompt + '…';
            const span2 = document.createElement('span');
            span2.className = 'text-zinc-700 text-[8px] flex-shrink-0 font-mono';
            span2.textContent = t;
            item.appendChild(span1);
            item.appendChild(span2);
            panel.appendChild(item);
        });
    }

    function toggleHistory() {
        historyOpen = !historyOpen;
        document.getElementById('historyPanel').classList.toggle('open', historyOpen);
        document.getElementById('historyChevron').style.transform = historyOpen ? 'rotate(180deg)' : '';
        if (historyOpen) refreshHistory();
    }

    function clearChat() {
        if (!activeModel) return;
        if (!confirm('Clear this chat?')) return;
        const modelId = activeModel.replace(/\//g, '-');
        const view = document.getElementById(`view-${modelId}`);
        if (view) view.innerHTML = '';
        const allChats = JSON.parse(localStorage.getItem(CHAT_STORAGE) || '{}');
        delete allChats[modelId];
        localStorage.setItem(CHAT_STORAGE, JSON.stringify(allChats));
        conversationHistories[modelId] = [];
        sessionTokens = 0;
        document.getElementById('tokenCounter').textContent = 'tokens: 0';
        showToast('Chat cleared', 'success');
    }

    function exportChat() {
        if (!activeModel) return showToast('Please select a model first');
        const modelId = activeModel.replace(/\//g, '-');
        const view = document.getElementById(`view-${modelId}`);
        if (!view?.innerHTML.trim()) return showToast('Chat is empty');
        const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
        <title>Chat Export — ${esc(activeModel)}</title>
        <style>
        body{background:#050505;color:#ececed;font-family:sans-serif;padding:24px;max-width:820px;margin:auto;line-height:1.6}
        .msg-user{background:#111;border:1px solid #222;padding:12px 18px;border-radius:12px;margin:12px 0;font-size:14px;white-space:pre-wrap}
        .msg-ai{border-left:2px solid #3b82f6;padding-left:14px;margin:12px 0;color:#d4d4d8;font-size:14px}
        pre{background:#0d0d10;padding:12px 16px;border-radius:8px;overflow-x:auto;color:#a3e635;font-size:12px;font-family:monospace;border:1px solid #2a2a2e}
        code{background:#1a1a1f;padding:2px 6px;border-radius:4px;color:#60a5fa;font-family:monospace;font-size:12px}
        pre code{background:none;color:inherit;padding:0}
        strong{color:#f4f4f5}h2,h3{color:#93c5fd}
        .code-block-wrap{border:1px solid #2a2a2e;border-radius:10px;overflow:hidden;margin:10px 0}
        .code-block-header{background:#0a0a0d;padding:6px 12px;border-bottom:1px solid #2a2a2e;font-size:9px;color:#60a5fa;font-family:monospace;text-transform:uppercase;letter-spacing:.1em}
        .copy-btn,.editor-btn,.continue-btn,.truncated-notice{display:none}
        img{max-width:280px;border-radius:10px;border:1px solid #333;margin:8px 0;display:block}
        </style></head>
        <body>
        <div style="font-size:10px;color:#3f3f46;font-family:monospace;margin-bottom:20px;">
            Lostsec EXPORT · ${esc(activeModel)} · ${new Date().toLocaleString()}
        </div>
        ${view.innerHTML}
        </body></html>`;
        const blob = new Blob([html], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `chat-${modelId}-${Date.now()}.html`;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('Chat exported', 'success');
    }

    document.getElementById('chatContainer').addEventListener('click', (e) => {
        const previewBtn = e.target.closest('.preview-html-btn');
        if (previewBtn) {
            const blockId = previewBtn.getAttribute('data-blockid');
            if (blockId) previewHtml(blockId);
        }
    });

    document.getElementById('userInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            executeRequest();
        }
    });
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'k') {
            e.preventDefault();
            const inp = document.getElementById('userInput');
            inp.value = '';
            inp.style.height = 'auto';
        }
        if (e.key === 'Escape') { closeEditor(); closeImgGen(); closeLightbox(); closeHtmlPreview(); }
    });

    function autoResize(el) {
        el.style.height = 'auto';
        const newHeight = Math.min(el.scrollHeight, 120);
        el.style.height = newHeight + 'px';
        el.style.overflowY = el.scrollHeight > 120 ? 'auto' : 'hidden';
    }


    function openImgGen() {
        if (!localStorage.getItem(KEY_STORAGE)) { showToast('Please enter API key first'); return; }
        document.getElementById('imgGenModal').classList.add('open');
        document.getElementById('imgGenPrompt').focus();
    }
    function closeImgGen() {
        document.getElementById('imgGenModal').classList.remove('open');
    }

    async function generateImage() {
        const prompt = document.getElementById('imgGenPrompt').value.trim();
        if (!prompt) { showToast('Please enter a prompt first'); return; }
        const key = localStorage.getItem(KEY_STORAGE);
        if (!key) { showToast('No API key found'); return; }
        if (!activeModel) { showToast('Please select a chat model first'); return; }

        const modelName = document.getElementById('imgGenModel').value;
        const ratio = document.getElementById('imgGenRatio').value;
        const count = parseInt(document.getElementById('imgGenCount').value);

        const submitBtn = document.getElementById('imgGenSubmitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa fa-sync fa-spin fa-xs mr-1"></i> Generating...';

        closeImgGen();

        const modelId = activeModel.replace(/\//g, '-');
        const view = document.getElementById(`view-${modelId}`);
        if (!view) { submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fa fa-wand-magic-sparkles fa-xs mr-1"></i> Generate'; return; }

        const userDiv = document.createElement('div');
        userDiv.className = 'msg-user';
        userDiv.textContent = '🎨 ' + prompt;
        view.appendChild(userDiv);

        const thinkDiv = document.createElement('div');
        thinkDiv.className = 'thinking-dots';
        thinkDiv.innerHTML = '<span></span><span></span><span></span>';
        view.appendChild(thinkDiv);
        scrollToBottom();

        try {
            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:predict?key=${encodeURIComponent(key)}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: [{ prompt }],
                        parameters: {
                            sampleCount: count,
                            aspectRatio: ratio,
                            safetyFilterLevel: 'block_few',
                            personGeneration: 'allow_adult'
                        }
                    })
                }
            );

            const data = await res.json();
            if (view.contains(thinkDiv)) view.removeChild(thinkDiv);

            if (data.error) {
                const errDiv = document.createElement('div');
                errDiv.className = 'msg-ai';
                errDiv.style.color = '#f87171';
                errDiv.textContent = `Imagen Error: ${data.error.message}`;
                view.appendChild(errDiv);
            } else {
                const predictions = data.predictions || [];
                if (!predictions.length) {
                    const errDiv = document.createElement('div');
                    errDiv.className = 'msg-ai';
                    errDiv.style.color = '#f87171';
                    errDiv.textContent = 'No images generated. Try describing your prompt in more detail or switch the model.';
                    view.appendChild(errDiv);
                } else {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'msg-ai-img';

                    const badge = document.createElement('div');
                    badge.className = 'imggen-badge';
                    badge.innerHTML = `<i class="fa fa-wand-magic-sparkles fa-xs"></i> ${modelName} · ${ratio} · ${predictions.length} image${predictions.length > 1 ? 's' : ''}`;
                    wrapper.appendChild(badge);

                    predictions.forEach((pred, idx) => {
                        const b64 = pred.bytesBase64Encoded;
                        const mime = pred.mimeType || 'image/png';
                        const src = `data:${mime};base64,${b64}`;

                        const img = document.createElement('img');
                        img.src = src;
                        img.alt = `Generated: ${prompt}`;
                        img.onclick = () => openLightbox(src);
                        wrapper.appendChild(img);

                        const actions = document.createElement('div');
                        actions.className = 'img-actions';

                        const dlBtn = document.createElement('button');
                        dlBtn.className = 'img-dl-btn';
                        dlBtn.innerHTML = '<i class="fa fa-download fa-xs"></i> Download';
                        dlBtn.onclick = () => {
                            const a = document.createElement('a');
                            a.href = src;
                            a.download = `imagen-${Date.now()}-${idx+1}.png`;
                            a.click();
                        };

                        const sendBtn = document.createElement('button');
                        sendBtn.className = 'img-send-btn';
                        sendBtn.innerHTML = '<i class="fa fa-paper-plane fa-xs"></i> Send to AI';
                        sendBtn.onclick = () => {
                            pendingImages.push({ base64: b64, mimeType: mime, name: `generated-${idx+1}.png`, preview: src });
                            renderAttachPreview();
                            document.getElementById('userInput').placeholder = 'Generated image attached — ask something about it...';
                            showToast('Image attached to input!', 'success');
                        };

                        actions.appendChild(dlBtn);
                        actions.appendChild(sendBtn);
                        wrapper.appendChild(actions);
                    });

                    view.appendChild(wrapper);
                    saveHistory('🎨 ' + prompt, modelId);
                }
            }
        } catch (err) {
            if (view.contains(thinkDiv)) view.removeChild(thinkDiv);
            const errDiv = document.createElement('div');
            errDiv.className = 'msg-ai';
            errDiv.style.color = '#f87171';
            errDiv.textContent = `Network Error: ${err.message}`;
            view.appendChild(errDiv);
        }

        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa fa-wand-magic-sparkles fa-xs mr-1"></i> Generate';
        scrollToBottom();
    }

    function openLightbox(src) {
        document.getElementById('lightboxImg').src = src;
        document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('open');
        document.getElementById('lightboxImg').src = '';
    }
    function scrollToBottom() {
        const c = document.getElementById('chatContainer');
        requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
    }
</script>
</body>
</html>
